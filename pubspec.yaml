name: leadflow
description: LeadFlow MVP - Simple lead tracking and follow-up app for SMBs.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.19.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.4.2
  firebase_messaging: ^15.1.2
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  http: ^0.13.6
  supabase_flutter: ^2.8.0
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
